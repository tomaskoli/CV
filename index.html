<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer CV - Code Syntax</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="cv-card">
            <!-- Profile Section -->
            <div class="profile-section">

                <div class="sidebar">
                    <div class="code-block">
                        <span class="keyword">namespace</span> <span class="class-name">CurriculumVitae</span>
                    </div>

                    <div class="section">
                        <div class="section-content" id="platforms">
                            <!-- Dynamic content -->
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title"><span class="keyword">public enum</span> <span class="type">Skills</span></div>
                        <div class="section-content" id="profile">
                            <!-- Dynamic content -->
                        </div>
                    </div>

                    <div class="section">
                        <div class="enum-title"><span class="keyword">public enum</span> <span class="type">Languages</span></div>
                        <div class="section-content" id="languagesList">
                            <!-- Dynamic content -->
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title"><span class="keyword">public enum</span> <span class="type">Tools</span></div>
                        <div class="section-content" id="toolsList">
                            <!-- Dynamic content -->
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title"><span class="keyword">public class</span> <span class="type">SpokenLanguages</span></div>
                        <div class="section-content" id="languagesSpoken">
                            <!-- Dynamic content -->
                        </div>
                    </div>

                    <div class="section">
                        <div class="enum-title"><span class="keyword">public enum</span> <span class="type">Certificates</span></div>
                        <div class="section-content" id="certificatesList">
                            <!-- Dynamic content -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Summary -->
                <div class="summary" id="summary">
                    <!-- Dynamic content -->
                </div>

                <!-- Information -->
                <div class="code-section">
                    <div class="code-line">
                        <span class="keyword">public sealed class</span> <span class="type">PersonalInformation</span>
                    </div>
                    <div class="code-block indent" id="information">
                        <!-- Dynamic content -->
                    </div>
                </div>

                <!-- Education -->
                <div class="code-section">
                    <div class="code-line">
                        <span class="keyword">public static class</span> <span class="type">EducationHistory</span>
                    </div>
                    <div class="code-block indent" id="education">
                        <!-- Dynamic content -->
                    </div>
                </div>

                <!-- Experience -->
                <div class="code-section">
                    <div class="code-line">
                        <span class="keyword">public abstract class</span> <span class="type">ProfessionalExperience</span>
                    </div>
                    <div class="code-block indent" id="experience">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script defer src="app.js"></script>
</body>
</html>
